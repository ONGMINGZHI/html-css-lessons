<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation on scroll</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</head>
<body>
    <section class="about" data-aos="fade-left"></section>
    <section class="projects" data-aos="fade-right"></section>
    <section class="gallery" data-aos="flip-left"></section>
    <section class="contact" data-aos="fade-right"></section>
</body>
</html>
