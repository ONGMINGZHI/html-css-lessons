<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Animations</title>
    <style>
        img{
            width: 200px;
            height: 200px;
        }
        body{
            margin: 0px;
            padding: 0px;
            color: white;
        }
        *{
            box-sizing: border-box;
        }
        .box{
            margin: 60px auto;
            width: 200px;
            height: 200px;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box:hover{
            animation-name: changeColor;
            animation-duration: 1s;
            animation-fill-mode: forwards;
        }
        @keyframes changeColor{
            from {
                background-color: black;
            }
            to{
                background-color: lightblue;
            }
        }
        #my-image{
            position: absolute;
            left: 0;
            top: 100px;
            animation-name: move-image;
            animation-duration: 3s;
            /* reveal the below one by one */
            animation-delay: 1s;
            animation-timing-function: ease-out;
            /* linear-the animation has the same speed from start to finish
                ease-default value,start slow,then fast,end slow
                ease-in-animation has a slow start
                ease-out-animation has a slow end
                ease-in-out-animation has both slow start and slow end
            */
            animation-iteration-count: infinite;
            /* iteration=repeat
               infinite=unlimited/endless
            */
            animation-direction: alternate-reverse;
            /* animation-direction options:display: 
                -normal -start from start again
                -reverse -start from end
                -alternate-start from start then come from end and repeat
                -alternate-reverse  -start from end and come from start and repeat          
            */
        }
        @keyframes move-image{
            0%{
                left:0
            }
            20%{
                bottom: 5;
            }
            50%{
                left: 50%;
            }
            100%{
                left: 100%;
            }
        }
       
       
    </style>
</head>
<body>
    <div class="box">Hover over me</div>
    <img id="my-image" src="https://images.unsplash.com/photo-1631631480669-535cc43f2327?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmFja2dyb3VuZCUyMGltYWdlfGVufDB8fDB8fHww" alt="a background image">
</body>
</html>
