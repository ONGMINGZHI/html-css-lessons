<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,intial-scale=1.0">
        <title>Box Model Example</title>
        <style>
            .box{
                box-sizing: content-box;
                width: 200px;
                height: 200px;
                background-color: rgb(156, 246, 161);
                padding: 10px;
                border: 5px solid rgb(17, 255, 0);
                margin: auto;
                margin-left: 30px;
                border-radius: 50px;
            }
        </style>
    </head>
    <body>
        <div class="box"></div>
    </body>
</html>
