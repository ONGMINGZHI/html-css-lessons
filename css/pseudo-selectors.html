<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo</title>
    <style>
        input:focus{
            border: 2px solid rgb(23, 23, 23);
        }
        p::after{
            content: "After the text.";
            font-style: italic;
        }
        p::before{
            content: "Before the text:";
            font-weight: bold;
        }
        ul li:first-child{
            font-weight: bold;
        }
        ul li:last-child{
            color: red;
        }
        h2:first-of-type{
            color: blue;
        }
        ul li:nth-child(2n){
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <input type="text"placeholder="Enter your name">
    <br/>
    <button>Submit</button>
    <br>
    <p>This is a long paragraph to show the effects of Pseudo Elements Selectors in CSS</p>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
        <li>Fourth item</li>
    </ul>
</body>
</html>
