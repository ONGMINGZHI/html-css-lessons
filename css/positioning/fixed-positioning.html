<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Positioning</title>
    <style>
        .header{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #233;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        body{
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="not-fixed-header">
            This is not a fixed header.
        </div>

    
        <div class="header">
        This is a fixed header.
        </div>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
        <h1>Another heading</h1>
    </div>
</body>
</html>
